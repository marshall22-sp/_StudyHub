<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyHub | Login</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!--================ Header ================-->

    <header>

        <div class="logo">

            <h2>StudyHub</h2>

        </div>

        <button class="menu-btn" id="menuBtn">

            ☰

        </button>

        <nav id="navbar">

            <ul>

                <li>
                    <a href="index.html" id="homeLink">Home</a>
                </li>

                <li>
                    <a href="login.html" id="loginLink">Login</a>
                </li>

                <li>
                    <a href="contact.html" id="contactLink">Contact Us</a>
                </li>

            </ul>

        </nav>

        <div class="actions">

            <button id="langBtn">

                العربية

            </button>

            <button id="themeBtn">

                🌙

            </button>

        </div>

    </header>

    <!--================ Login ================-->

    <section class="login">

        <form class="login-form">

            <h2 id="loginTitle">

                Student Login

            </h2>

            <input

                type="email"

                id="email"

                placeholder="Email Address"

            >

            <input

                type="password"

                id="password"

                placeholder="Password"

            >

            <!-- <div class="remember">

                <label>

                    <input type="checkbox">

                    <span id="rememberText">

                        Remember Me

                    </span>

                </label>

            </div> -->

            <button

                type="submit"

                id="loginButton">

                Login

            </button>

            <p class="register-link">

                <span id="accountText">

                    Don't have an account?

                </span>

                <a href="#">

                    Register

                </a>

            </p>

        </form>

    </section>

    <!--================ Footer ================-->

    <footer>

        <p id="footerText">

            © 2026 StudyHub. All Rights Reserved.

        </p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
