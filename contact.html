<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyHub | Contact Us</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!--========== Header ==========-->

    <header>

        <div class="logo">

            <h2>StudyHub</h2>

        </div>

        <button class="menu-btn" id="menuBtn">

            ☰

        </button>

        <nav id="navbar">

            <ul>

                <li>

                    <a href="index.html" id="homeLink">

                        Home

                    </a>

                </li>

                <li>

                    <a href="login.html" id="loginLink">

                        Login

                    </a>

                </li>

                <li>

                    <a href="contact.html" id="contactLink">

                        Contact Us

                    </a>

                </li>

            </ul>

        </nav>

        <div class="actions">

            <button id="langBtn">

                العربية

            </button>

            <button id="themeBtn">

                🌙

            </button>

        </div>

    </header>

    <!--========== Page Title ==========-->

    <section class="page-title">

        <h1 id="contactTitle">

            Contact Us

        </h1>

        <p id="contactSubtitle">

            We'd love to hear from you.

        </p>

    </section>

    <!--========== Contact Section ==========-->

    <section class="contact-container">

        <div class="contact-info">

            <h2 id="infoTitle">

                Contact Information

            </h2>

            <p>

                📍 Sudan

            </p>

            <p>

                📞 +249 000 000000

            </p>

            <p>

                📧 info@studyhub.com

            </p>

            <p>

                🌐 www.studyhub.com

            </p>

        </div>

        <div class="contact-form">

            <form>

                <input

                    type="text"

                    id="name"

                    placeholder="Full Name"

                    required
                >

                <input

                    type="email"

                    id="email"

                    placeholder="Email Address"

                    required
                >

                <input

                    type="text"

                    id="subject"

                    placeholder="Subject"

                    required
                >

                <textarea

                    id="message"

                    placeholder="Write your message..."

                    rows="6"

                    required>

                </textarea>

                <button

                    type="submit"

                    id="sendBtn">

                    Send Message

                </button>

            </form>

        </div>

    </section>

    <!--========== Map ==========-->

    <!-- <section class="map">

        <iframe

            src="https://www.google.com/maps?q=Khartoum&output=embed"

            width="100%"

            height="350"

            style="border:0;"

            loading="lazy">

        </iframe>

    </section> -->

    <!--========== Footer ==========-->

    <footer>

        <p id="footerText">

            © 2026 StudyHub. All Rights Reserved.

        </p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
